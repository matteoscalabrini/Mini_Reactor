; PlatformIO Project Configuration File
; ESP32-S3 Bioreactor Module — browser-controlled fermentation firmware

[env:esp32-s3-devkitc-1]
platform = espressif32@6.9.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

board_build.partitions = partitions.csv
board_build.filesystem = spiffs

; Patch OneWire 2.3.8 so it can drive GPIO42 (DS18B20) as output on the ESP32-S3.
; See tools/patch_onewire.py — upstream caps output pins at 33 (a classic-ESP32
; input-only assumption that doesn't apply to the S3).
extra_scripts = pre:tools/patch_onewire.py

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1   ; route Serial over the native USB CDC port

lib_deps =
    teemuatlut/TMCStepper@^0.7.3            ; TMC2209 single-wire UART driver
    bblanchon/ArduinoJson@^7                ; JSON for the REST/WebSocket API
    mathieucarbou/ESPAsyncWebServer@^3.3.0  ; async HTTP + WebSocket (pulls AsyncTCP)
    paulstoffregen/OneWire@^2.3.8           ; 1-Wire bus for the DS18B20
    milesburton/DallasTemperature@^3.11.0   ; DS18B20 liquid temperature probe
    olikraus/U8g2 @ ^2.36.18               ; SH1107 128x128 front-panel OLED

[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17 -Iinclude
