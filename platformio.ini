; PlatformIO Project Configuration File
; ESP32-S3 Bioreactor Module — browser-controlled fermentation firmware

[env:esp32-s3-devkitc-1]
; pioarduino fork — ships Arduino-ESP32 3.3.9 / ESP-IDF 5.5.4 (Claude.md IDF 5.5.x mandate).
; The official espressif32 platform tops out at Arduino 2.x / IDF 4.4.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 115200

board_build.partitions = partitions.csv
board_build.filesystem = spiffs

; Patch OneWire 2.3.8 so it can drive GPIO42 (DS18B20) as output on the ESP32-S3.
; See tools/patch_onewire.py — upstream caps output pins at 33 (a classic-ESP32
; input-only assumption that doesn't apply to the S3).
extra_scripts = pre:tools/patch_onewire.py

build_src_filter =
    +<*>
    -<features/hub/>

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1   ; route Serial over the native USB CDC port
    -DASYNCWEBSERVER_REGEX=1      ; enable regex routes (/api/v1/runs/<id>)

lib_deps =
    teemuatlut/TMCStepper@^0.7.3            ; TMC2209 single-wire UART driver
    bblanchon/ArduinoJson@^7                ; JSON for the REST/WebSocket API
    mathieucarbou/ESPAsyncWebServer@^3.3.0  ; async HTTP + WebSocket (pulls AsyncTCP)
    paulstoffregen/OneWire@^2.3.8           ; 1-Wire bus for the DS18B20
    milesburton/DallasTemperature@^3.11.0   ; DS18B20 liquid temperature probe
    olikraus/U8g2 @ ^2.36.18               ; SH1107 128x128 front-panel OLED

[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17 -Iinclude

[env:hub]
; Waveshare ESP32-S3-Touch-AMOLED-1.75 companion device.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
platform_packages =
    framework-arduinoespressif32@https://github.com/espressif/arduino-esp32/releases/download/3.3.10/esp32-core-3.3.10.tar.xz
    framework-arduinoespressif32-libs@https://github.com/espressif/arduino-esp32/releases/download/3.3.10/esp32-core-3.3.10-libs.tar.xz
    framework-espidf@https://github.com/pioarduino/esp-idf/releases/download/v5.5.4/esp-idf-v5.5.4.tar.xz
board = esp32-s3-devkitc1-n16r8
framework = arduino
board_build.partitions = partitions_hub_16mb.csv
board_build.filesystem = spiffs
board_build.cmake_extra_args = -DEXCLUDE_COMPONENTS=esp-matter
custom_sdkconfig =
    CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP=y
    CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL=4096
monitor_speed = 115200
upload_speed = 921600
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=2
    -I .
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_CONF_PATH=include/hub/lv_conf.h
lib_deps =
    lvgl/lvgl @ 8.3.11
build_src_filter =
    +<*>
    -<main.cpp>
    -<system/AppRuntime.cpp>
    -<net/>
    -<features/control/>
    -<features/heater/>
    -<features/motor/>
    -<features/sensor/>
    -<features/ui/>
    -<storage/>
    -<power/Husb238.cpp>
